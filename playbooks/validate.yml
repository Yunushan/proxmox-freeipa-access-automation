---
- name: Prepare Linux inventory for validation
  import_playbook: includes/prepare_linux_inventory.yml
  tags:
    - validate
    - linux
    - linux_enroll
    - inventory
    - discovery

- name: Resolve Linux hostnames for validation
  import_playbook: includes/resolve_linux_hostnames.yml
  tags:
    - validate
    - linux
    - linux_enroll
    - inventory
    - hostnames

- name: Validate inventory and variables locally
  hosts: localhost
  connection: local
  gather_facts: false
  tags:
    - validate
  tasks:
    - name: Assert feature toggle combinations are valid
      tags:
        - validate
      ansible.builtin.assert:
        that:
          - not (proxmox_rbac_enabled | bool) or (proxmox_ldap_enabled | bool)
          - not (proxmox_realm_sync_timer_enabled | bool) or (proxmox_ldap_enabled | bool)
        fail_msg: One or more feature toggles are mutually incompatible.

    - name: Check required FreeIPA variable presence when enabled
      tags:
        - validate
        - freeipa
        - freeipa_access
      ansible.builtin.assert:
        that:
          - freeipa_admin_principal | length > 0
          - freeipa_admin_password | length > 0
        fail_msg: FreeIPA access-model variables are missing or empty.
      when: freeipa_access_model_enabled | bool

    - name: Check required Proxmox LDAP variable presence when enabled
      tags:
        - validate
        - proxmox
        - proxmox_ldap
      ansible.builtin.assert:
        that:
          - proxmox_ldap_bind_password | length > 0
          - proxmox_ldap_realm_id | length > 0
          - proxmox_ldap_server1 | length > 0
          - proxmox_ldap_base_dn | length > 0
          - proxmox_ldap_group_dn | length > 0
          - proxmox_ldap_bind_dn | length > 0
        fail_msg: Proxmox LDAP variables are missing or empty.
      when: proxmox_ldap_enabled | bool

    - name: Check required Linux enrollment variable presence when enabled
      tags:
        - validate
        - linux
        - linux_enroll
      ansible.builtin.assert:
        that:
          - ipaclient_domain | length > 0
          - ipaclient_realm | length > 0
          - linux_ipaadmin_principal | length > 0
          - linux_ipaadmin_password | length > 0
        fail_msg: Linux FreeIPA enrollment variables are missing or empty.
      when: linux_freeipa_enroll_enabled | bool

- name: Validate Proxmox node prerequisites
  hosts: proxmox_primary
  become: true
  gather_facts: false
  serial: "{{ proxmox_rollout_serial | default(1) | int }}"
  max_fail_percentage: "{{ proxmox_rollout_max_fail_percentage | default(0) | int }}"
  tags:
    - validate
  tasks:
    - name: Validate Proxmox command and version prerequisites
      tags:
        - validate
        - proxmox
        - proxmox_ldap
        - proxmox_sync
        - proxmox_rbac
        - discovery
      when: >-
        (proxmox_ldap_enabled | bool)
        or (proxmox_rbac_enabled | bool)
        or (proxmox_realm_sync_timer_enabled | bool)
        or (linux_ipa_proxmox_discovery_enabled | bool)
      block:
        - name: Confirm pveum is installed
          ansible.builtin.command: which pveum
          check_mode: false
          changed_when: false

        - name: Confirm pvesh is installed
          ansible.builtin.command: which pvesh
          check_mode: false
          changed_when: false

        - name: Confirm qm is installed when discovery is enabled
          ansible.builtin.command: which qm
          check_mode: false
          changed_when: false
          when: linux_ipa_proxmox_discovery_enabled | bool

        - name: Read Proxmox VE version
          ansible.builtin.command: pveversion
          register: proxmox_version_raw
          check_mode: false
          changed_when: false

        - name: Extract Proxmox VE major version
          ansible.builtin.set_fact:
            proxmox_pve_major_version: "{{ (proxmox_version_raw.stdout | regex_search('pve-manager/[0-9]+') | default('0', true) | regex_replace('^pve-manager/', '')) | int }}"

        - name: Assert Proxmox VE major version is supported
          ansible.builtin.assert:
            that:
              - proxmox_pve_major_version > 0
              - proxmox_pve_major_version in (proxmox_supported_major_versions | default([6, 7, 8, 9, 10]))
            fail_msg: >-
              Proxmox VE major version {{ proxmox_pve_major_version | default('unknown') }} is not supported by this repository.
              Supported major versions: {{ proxmox_supported_major_versions | default([6, 7, 8, 9, 10]) | join(', ') }}.
              Detected version string: {{ proxmox_version_raw.stdout }}.
            success_msg: >-
              Proxmox VE {{ proxmox_pve_major_version }} is within the supported major version set:
              {{ proxmox_supported_major_versions | default([6, 7, 8, 9, 10]) | join(', ') }}.

- name: Validate IPA server prerequisites
  hosts: ipa_servers
  become: true
  gather_facts: false
  serial: "{{ freeipa_access_serial | default(1) | int }}"
  max_fail_percentage: "{{ freeipa_access_max_fail_percentage | default(0) | int }}"
  tags:
    - validate
  tasks:
    - name: Confirm ipa CLI is installed when FreeIPA access-model automation is enabled
      tags:
        - validate
        - freeipa
        - freeipa_access
      ansible.builtin.command: which ipa
      check_mode: false
      changed_when: false
      when: freeipa_access_model_enabled | bool

- name: Validate Linux IPA client prerequisites
  hosts: linux_ipa_clients_runtime
  become: true
  gather_facts: false
  serial: "{{ linux_freeipa_enroll_serial | default(10) | int }}"
  max_fail_percentage: "{{ linux_freeipa_enroll_max_fail_percentage | default(0) | int }}"
  tags:
    - validate
  tasks:
    - name: Confirm package manager exists when Linux enrollment is enabled
      tags:
        - validate
        - linux
        - linux_enroll
      ansible.builtin.shell: command -v dnf || command -v apt-get || command -v yum
      check_mode: false
      changed_when: false
      when: linux_freeipa_enroll_enabled | bool
