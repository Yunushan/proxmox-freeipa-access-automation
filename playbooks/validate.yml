---
- name: Validate inventory and variables locally
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Check required variable presence
      ansible.builtin.assert:
        that:
          - freeipa_admin_password | length > 0
          - proxmox_ldap_bind_password | length > 0
          - proxmox_ldap_realm_id | length > 0
          - ipaclient_domain | length > 0
          - ipaclient_realm | length > 0
        fail_msg: One or more required variables are empty.

- name: Validate Proxmox node prerequisites
  hosts: proxmox_primary
  become: true
  gather_facts: false
  tasks:
    - name: Confirm pveum is installed
      ansible.builtin.command: which pveum
      changed_when: false

    - name: Confirm pvesh is installed
      ansible.builtin.command: which pvesh
      changed_when: false

    - name: Read Proxmox VE version
      ansible.builtin.command: pveversion
      register: proxmox_version_raw
      changed_when: false

    - name: Extract Proxmox VE major version
      ansible.builtin.set_fact:
        proxmox_pve_major_version: >-
          {{
            (
              proxmox_version_raw.stdout
              | regex_search('pve-manager/[0-9]+')
              | default('0', true)
              | regex_replace('^pve-manager/', '')
            ) | int
          }}

    - name: Assert Proxmox VE major version is supported
      ansible.builtin.assert:
        that:
          - proxmox_pve_major_version > 0
          - proxmox_pve_major_version in (proxmox_supported_major_versions | default([7, 8, 9]))
        fail_msg: >-
          Proxmox VE major version {{ proxmox_pve_major_version | default('unknown') }} is not supported by this repository.
          Supported major versions: {{ proxmox_supported_major_versions | default([7, 8, 9]) | join(', ') }}.
          Detected version string: {{ proxmox_version_raw.stdout }}.
        success_msg: >-
          Proxmox VE {{ proxmox_pve_major_version }} is within the supported major version set:
          {{ proxmox_supported_major_versions | default([7, 8, 9]) | join(', ') }}.

- name: Validate IPA server prerequisites
  hosts: ipa_servers
  become: true
  gather_facts: false
  tasks:
    - name: Confirm ipa CLI is installed
      ansible.builtin.command: which ipa
      changed_when: false

- name: Validate Linux IPA client prerequisites
  hosts: linux_ipa_clients
  become: true
  gather_facts: false
  tasks:
    - name: Confirm package manager exists
      ansible.builtin.shell: command -v dnf || command -v apt-get || command -v yum
      changed_when: false
