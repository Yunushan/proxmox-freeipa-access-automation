---
- import_playbook: includes/prepare_linux_inventory.yml
  tags:
    - freeipa
    - freeipa_access
    - linux
    - linux_enroll
    - inventory
    - discovery

- import_playbook: includes/resolve_linux_hostnames.yml
  tags:
    - freeipa
    - freeipa_access
    - linux
    - linux_enroll
    - inventory
    - hostnames

- name: Build FreeIPA access model
  hosts: ipa_servers
  become: true
  gather_facts: false
  serial: "{{ freeipa_access_serial | default(1) | int }}"
  max_fail_percentage: "{{ freeipa_access_max_fail_percentage | default(0) | int }}"
  tags:
    - freeipa
    - freeipa_access
  roles:
    - role: freeipa_access_model
      when: freeipa_access_model_enabled | bool
      tags:
        - freeipa
        - freeipa_access

- name: Configure Proxmox LDAP realm and RBAC
  hosts: proxmox_primary
  become: true
  gather_facts: false
  serial: "{{ proxmox_rollout_serial | default(1) | int }}"
  max_fail_percentage: "{{ proxmox_rollout_max_fail_percentage | default(0) | int }}"
  tags:
    - proxmox
  roles:
    - role: proxmox_ldap_realm
      when: proxmox_ldap_enabled | bool
      tags:
        - proxmox
        - proxmox_ldap
    - role: proxmox_realm_sync_timer
      when: proxmox_ldap_enabled | bool and proxmox_realm_sync_timer_enabled | bool
      tags:
        - proxmox
        - proxmox_sync
    - role: proxmox_rbac
      when: proxmox_ldap_enabled | bool and proxmox_rbac_enabled | bool
      tags:
        - proxmox
        - proxmox_rbac

- name: Enroll Linux guests into FreeIPA
  hosts: linux_ipa_clients_runtime
  become: true
  gather_facts: true
  serial: "{{ linux_freeipa_enroll_serial | default(10) | int }}"
  max_fail_percentage: "{{ linux_freeipa_enroll_max_fail_percentage | default(0) | int }}"
  tags:
    - linux
    - linux_enroll
  roles:
    - role: linux_freeipa_enroll
      when: linux_freeipa_enroll_enabled | bool
      tags:
        - linux
        - linux_enroll
