---
# -----------------------------
# Global feature toggles
# -----------------------------
freeipa_access_model_enabled: true
proxmox_ldap_enabled: true
proxmox_rbac_enabled: true
proxmox_realm_sync_timer_enabled: true
linux_freeipa_enroll_enabled: true

# -----------------------------
# FreeIPA admin/API values
# -----------------------------
freeipa_admin_principal: admin
freeipa_admin_password: "{{ vault_freeipa_admin_password }}"
freeipa_api_context: server

# -----------------------------
# Linux IPA client enrollment
# -----------------------------
ipaclient_domain: example.com
ipaclient_realm: EXAMPLE.COM
linux_ipa_servers:
  - ipa01.example.com
linux_ipaclient_mkhomedir: true
linux_ipaclient_force_join: false
linux_ipaclient_no_dns_lookup: true
linux_ipaclient_no_sudo: false
linux_ipasssd_permit: false
linux_ipaclient_configure_dns_resolver: false
linux_ipaclient_dns_servers: []
linux_ipaclient_install_packages: true

# -----------------------------
# FreeIPA access model
# -----------------------------
freeipa_user_groups:
  - name: proxmox-admins
    description: Full Proxmox administrators
  - name: linux-ssh-admins
    description: Linux SSH administrators

freeipa_hostgroups:
  - name: linux-all
    description: All Linux clients from the Ansible inventory
    inventory_groups:
      - linux_ipa_clients

freeipa_hbac_rules:
  - name: allow-linux-ssh-admins
    description: Allow linux-ssh-admins to access all Linux IPA clients over SSH
    group:
      - linux-ssh-admins
    hostgroup:
      - linux-all
    hbacsvc:
      - sshd
    state: enabled

# -----------------------------
# Proxmox LDAP realm
# -----------------------------
proxmox_supported_major_versions:
  - 6
  - 7
  - 8
  - 9
  - 10
# Older legacy majors can be added locally if you need to bypass the version gate,
# but they are not claimed as tested support by this public repository.
# Future major versions may appear here as provisional compatibility gates before
# they are publicly validated end-to-end against a released Proxmox version.
proxmox_ldap_realm_id: ipa
proxmox_ldap_type: ldap
proxmox_ldap_server1: ipa01.example.com
proxmox_ldap_server2: ""
proxmox_ldap_port: 636
proxmox_ldap_mode: ldaps
proxmox_ldap_verify_tls: true
proxmox_ldap_sslversion: tlsv1_2
proxmox_ldap_capath: /etc/ssl/certs
proxmox_ldap_base_dn: cn=users,cn=accounts,dc=example,dc=com
proxmox_ldap_group_dn: cn=groups,cn=accounts,dc=example,dc=com
proxmox_ldap_bind_dn: uid=svc-proxmox,cn=users,cn=accounts,dc=example,dc=com
proxmox_ldap_bind_password: "{{ vault_proxmox_ldap_bind_password }}"
proxmox_ldap_user_attr: uid
proxmox_ldap_user_classes:
  - inetorgperson
  - posixaccount
  - person
proxmox_ldap_group_classes:
  - ipausergroup
  - groupOfNames
  - group
proxmox_ldap_group_name_attr: cn
proxmox_ldap_users_autocreate: true
proxmox_ldap_groups_autocreate: true
proxmox_ldap_check_connection: true
proxmox_ldap_default_realm: false
proxmox_ldap_comment: FreeIPA LDAP realm
proxmox_ldap_filter: ""
proxmox_ldap_group_filter: ""
proxmox_ldap_force_password_update: false
proxmox_ldap_sync_attributes:
  email: mail
  firstname: givenname
  lastname: sn
proxmox_ldap_sync_defaults:
  enable_new: true
  remove_vanished: none
  scope: both
proxmox_ldap_initial_sync_enabled: true
proxmox_ldap_force_sync_on_run: false

# -----------------------------
# Proxmox recurring sync timer
# -----------------------------
proxmox_realm_sync_service_name: proxmox-realm-sync
proxmox_realm_sync_on_calendar: "*:0/15"
proxmox_realm_sync_persistent: true
proxmox_realm_sync_scope: "{{ proxmox_ldap_sync_defaults.scope }}"
proxmox_realm_sync_enable_new: "{{ proxmox_ldap_sync_defaults.enable_new }}"
proxmox_realm_sync_remove_vanished: "{{ proxmox_ldap_sync_defaults.remove_vanished }}"

# -----------------------------
# Proxmox RBAC
# -----------------------------
proxmox_custom_roles:
  - name: LinuxVMOperator
    privs: "VM.Audit VM.Console VM.Monitor VM.PowerMgmt Pool.Audit Datastore.Audit"

proxmox_acl_bindings:
  - path: "/"
    group: "proxmox-admins-{{ proxmox_ldap_realm_id }}"
    role: PVEAdmin
    propagate: true
