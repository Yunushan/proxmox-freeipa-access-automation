---
name: CI

'on':
  push:
  pull_request:

jobs:
  lint-and-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ansible tooling
        run: |
          python -m pip install --upgrade pip
          pip install "ansible-core>=2.14" ansible-lint yamllint

      - name: Install required Ansible collection
        run: ./scripts/bootstrap.sh

      - name: Run repository lint checks
        run: python scripts/lint.py

      - name: Run repository smoke checks
        run: python scripts/smoke-test.py
