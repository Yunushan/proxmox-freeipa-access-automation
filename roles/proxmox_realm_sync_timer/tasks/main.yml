---
- name: Deploy Proxmox realm sync script
  ansible.builtin.template:
    src: proxmox-realm-sync.sh.j2
    dest: "/usr/local/sbin/{{ proxmox_realm_sync_service_name }}.sh"
    owner: root
    group: root
    mode: '0750'

- name: Deploy Proxmox realm sync service unit
  ansible.builtin.template:
    src: proxmox-realm-sync.service.j2
    dest: "/etc/systemd/system/{{ proxmox_realm_sync_service_name }}.service"
    owner: root
    group: root
    mode: '0644'
  notify: Reload systemd

- name: Deploy Proxmox realm sync timer unit
  ansible.builtin.template:
    src: proxmox-realm-sync.timer.j2
    dest: "/etc/systemd/system/{{ proxmox_realm_sync_service_name }}.timer"
    owner: root
    group: root
    mode: '0644'
  notify: Reload systemd

- name: Flush handlers
  ansible.builtin.meta: flush_handlers

- name: Enable and start Proxmox realm sync timer
  ansible.builtin.systemd:
    name: "{{ proxmox_realm_sync_service_name }}.timer"
    daemon_reload: true
    enabled: true
    state: started
  when: not ansible_check_mode
