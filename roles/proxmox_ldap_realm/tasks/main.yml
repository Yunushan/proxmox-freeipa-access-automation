---
- name: Validate Proxmox LDAP realm inputs
  ansible.builtin.assert:
    that:
      - proxmox_ldap_realm_id | length > 0
      - proxmox_ldap_server1 | length > 0
      - proxmox_ldap_base_dn | length > 0
      - proxmox_ldap_group_dn | length > 0
      - proxmox_ldap_bind_dn | length > 0
      - proxmox_ldap_bind_password | length > 0
      - proxmox_ldap_user_attr | length > 0
    fail_msg: Required Proxmox LDAP realm variables are missing.

- name: Read Proxmox VE version
  ansible.builtin.command: pveversion
  register: proxmox_version_raw
  check_mode: false
  changed_when: false

- name: Extract Proxmox VE major version
  ansible.builtin.set_fact:
    proxmox_pve_major_version: >-
      {{
        (
          proxmox_version_raw.stdout
          | regex_search('pve-manager/[0-9]+')
          | default('0', true)
          | regex_replace('^pve-manager/', '')
        ) | int
      }}

- name: Assert Proxmox VE major version is supported
  ansible.builtin.assert:
    that:
      - proxmox_pve_major_version > 0
      - proxmox_pve_major_version in proxmox_supported_major_versions
    fail_msg: >-
      Proxmox VE major version {{ proxmox_pve_major_version | default('unknown') }} is not supported by this role.
      Supported major versions: {{ proxmox_supported_major_versions | join(', ') }}.
      Detected version string: {{ proxmox_version_raw.stdout }}.

- name: Read current Proxmox authentication realms
  ansible.builtin.command:
    argv:
      - pvesh
      - get
      - /access/domains
      - --output-format
      - json
  register: proxmox_realms_raw
  check_mode: false
  changed_when: false

- name: Extract current realm definition
  ansible.builtin.set_fact:
    proxmox_ldap_current: >-
      {{
        (proxmox_realms_raw.stdout | from_json
         | selectattr('realm', 'equalto', proxmox_ldap_realm_id)
         | list
         | first) | default({})
      }}

- name: Build LDAP sync attributes string
  ansible.builtin.set_fact:
    proxmox_ldap_sync_attributes_str: >-
      {{ proxmox_ldap_sync_attributes | dictsort | map('join', '=') | join(',') }}

- name: Build LDAP sync defaults string
  ansible.builtin.set_fact:
    proxmox_ldap_sync_defaults_options_str: >-
      enable-new={{ (proxmox_ldap_sync_defaults.enable_new | bool) | ternary(1, 0) }},remove-vanished={{ proxmox_ldap_sync_defaults.remove_vanished }},scope={{ proxmox_ldap_sync_defaults.scope }}

- name: Decide if password must be updated
  ansible.builtin.set_fact:
    proxmox_ldap_include_password: "{{ (proxmox_ldap_current == {}) or (proxmox_ldap_force_password_update | bool) }}"

- name: Decide if realm configuration drift exists
  ansible.builtin.set_fact:
    proxmox_ldap_needs_change: >-
      {{
        (proxmox_ldap_current == {})
        or (proxmox_ldap_current.server1 | default('') | string != proxmox_ldap_server1 | string)
        or (proxmox_ldap_current.port | default('') | string != proxmox_ldap_port | string)
        or (proxmox_ldap_current.base_dn | default('') | string != proxmox_ldap_base_dn | string)
        or (proxmox_ldap_current.group_dn | default('') | string != proxmox_ldap_group_dn | string)
        or (proxmox_ldap_current.bind_dn | default('') | string != proxmox_ldap_bind_dn | string)
        or (proxmox_ldap_current.user_attr | default('') | string != proxmox_ldap_user_attr | string)
        or (proxmox_ldap_current.mode | default('') | string != proxmox_ldap_mode | string)
        or (proxmox_ldap_current.comment | default('') | string != proxmox_ldap_comment | string)
        or (proxmox_ldap_current.group_name_attr | default('') | string != proxmox_ldap_group_name_attr | string)
        or (proxmox_ldap_current.filter | default('') | string != proxmox_ldap_filter | string)
        or (proxmox_ldap_current.group_filter | default('') | string != proxmox_ldap_group_filter | string)
        or (proxmox_ldap_current.server2 | default('') | string != proxmox_ldap_server2 | string)
        or (proxmox_ldap_current.autocreate | default('0') | string != ((proxmox_ldap_users_autocreate | bool) | ternary('1', '0')))
        or (proxmox_ldap_current['groups-autocreate'] | default('0') | string != ((proxmox_ldap_groups_autocreate | bool) | ternary('1', '0')))
        or (proxmox_ldap_current['sync-defaults-options'] | default('') | string != proxmox_ldap_sync_defaults_options_str | string)
        or (proxmox_ldap_current.sync_attributes | default('') | string != proxmox_ldap_sync_attributes_str | string)
        or (proxmox_ldap_current.verify | default('0') | string != ((proxmox_ldap_verify_tls | bool) | ternary('1', '0')))
        or (proxmox_ldap_current.capath | default('') | string != proxmox_ldap_capath | string)
        or (proxmox_ldap_current['check-connection'] | default('0') | string != ((proxmox_ldap_check_connection | bool) | ternary('1', '0')))
        or (proxmox_ldap_current.default | default('0') | string != ((proxmox_ldap_default_realm | bool) | ternary('1', '0')))
        or (proxmox_ldap_include_password | bool)
      }}

- name: Build Proxmox realm command arguments
  ansible.builtin.set_fact:
    proxmox_ldap_realm_cmd: >-
      {{
        ['pveum', 'realm', ((proxmox_ldap_current == {}) | ternary('add', 'modify')), proxmox_ldap_realm_id,
         '--type', proxmox_ldap_type,
         '--server1', proxmox_ldap_server1,
         '--port', proxmox_ldap_port | string,
         '--mode', proxmox_ldap_mode,
         '--base_dn', proxmox_ldap_base_dn,
         '--group_dn', proxmox_ldap_group_dn,
         '--bind_dn', proxmox_ldap_bind_dn,
         '--user_attr', proxmox_ldap_user_attr,
         '--user_classes', proxmox_ldap_user_classes | join(','),
         '--group_classes', proxmox_ldap_group_classes | join(','),
         '--group_name_attr', proxmox_ldap_group_name_attr,
         '--autocreate', ((proxmox_ldap_users_autocreate | bool) | ternary('1', '0')),
         '--groups-autocreate', ((proxmox_ldap_groups_autocreate | bool) | ternary('1', '0')),
         '--verify', ((proxmox_ldap_verify_tls | bool) | ternary('1', '0')),
         '--capath', proxmox_ldap_capath,
         '--check-connection', ((proxmox_ldap_check_connection | bool) | ternary('1', '0')),
         '--comment', proxmox_ldap_comment,
         '--default', ((proxmox_ldap_default_realm | bool) | ternary('1', '0')),
         '--sync-defaults-options', proxmox_ldap_sync_defaults_options_str]
        + ((proxmox_ldap_sync_attributes_str | length > 0) | ternary(['--sync_attributes', proxmox_ldap_sync_attributes_str], []))
        + ((proxmox_ldap_filter | length > 0) | ternary(['--filter', proxmox_ldap_filter], []))
        + ((proxmox_ldap_group_filter | length > 0) | ternary(['--group_filter', proxmox_ldap_group_filter], []))
        + ((proxmox_ldap_server2 | length > 0) | ternary(['--server2', proxmox_ldap_server2], []))
        + ((proxmox_ldap_include_password | bool) | ternary(['--password', proxmox_ldap_bind_password], []))
      }}

- name: Apply Proxmox LDAP realm configuration
  ansible.builtin.command:
    argv: "{{ proxmox_ldap_realm_cmd }}"
  register: proxmox_ldap_realm_change
  when: proxmox_ldap_needs_change | bool
  changed_when: true
  no_log: true

- name: Run initial Proxmox realm sync when requested
  ansible.builtin.command:
    argv:
      - pveum
      - realm
      - sync
      - "{{ proxmox_ldap_realm_id }}"
      - --scope
      - "{{ proxmox_ldap_sync_defaults.scope }}"
      - --enable-new
      - "{{ (proxmox_ldap_sync_defaults.enable_new | bool) | ternary('1', '0') }}"
      - --remove-vanished
      - "{{ proxmox_ldap_sync_defaults.remove_vanished }}"
  register: proxmox_ldap_initial_sync
  when:
    - proxmox_ldap_initial_sync_enabled | bool
    - (proxmox_ldap_needs_change | bool) or (proxmox_ldap_force_sync_on_run | bool)
  changed_when: true
