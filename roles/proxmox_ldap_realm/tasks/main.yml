---
- name: Validate Proxmox LDAP realm configuration
  ansible.builtin.include_tasks: validate.yml

- name: Read current Proxmox LDAP realm state
  ansible.builtin.include_tasks: read_state.yml

- name: Build desired Proxmox LDAP realm state
  ansible.builtin.include_tasks: build_state.yml

- name: Apply Proxmox LDAP realm changes
  ansible.builtin.include_tasks: apply.yml

- name: Run initial Proxmox LDAP realm sync
  ansible.builtin.include_tasks: sync.yml
