---
- name: Validate Linux IPA enrollment inputs
  ansible.builtin.assert:
    that:
      - ipaclient_domain | length > 0
      - ipaclient_realm | length > 0
      - linux_ipaadmin_principal | length > 0
      - linux_ipaadmin_password | length > 0
      - (linux_ipa_servers | length > 0) or not (linux_ipaclient_no_dns_lookup | bool)
    fail_msg: Required Linux FreeIPA enrollment variables are missing.

- name: Prepare effective Linux IPA enrollment variables
  ansible.builtin.set_fact:
    linux_freeipa_enroll_effective_ipaadmin_principal: "{{ linux_ipaadmin_principal }}"
    linux_freeipa_enroll_effective_ipaadmin_password: "{{ linux_ipaadmin_password }}"
    linux_freeipa_enroll_effective_domain: "{{ ipaclient_domain }}"
    linux_freeipa_enroll_effective_realm: "{{ ipaclient_realm }}"
    linux_freeipa_enroll_effective_servers: "{{ linux_ipa_servers }}"
    linux_freeipa_enroll_effective_mkhomedir: "{{ linux_ipaclient_mkhomedir }}"
    linux_freeipa_enroll_effective_force_join: "{{ linux_ipaclient_force_join }}"
    linux_freeipa_enroll_effective_no_dns_lookup: "{{ linux_ipaclient_no_dns_lookup }}"
    linux_freeipa_enroll_effective_no_sudo: "{{ linux_ipaclient_no_sudo }}"
    linux_freeipa_enroll_effective_permit: "{{ linux_ipasssd_permit }}"
    linux_freeipa_enroll_effective_install_packages: "{{ linux_ipaclient_install_packages }}"
    linux_freeipa_enroll_effective_configure_dns_resolver: "{{ linux_ipaclient_configure_dns_resolver }}"
    linux_freeipa_enroll_effective_dns_servers: "{{ linux_ipaclient_dns_servers }}"
  changed_when: false
  no_log: true

- name: Normalize Linux IPA enrollment server inputs
  ansible.builtin.set_fact:
    linux_freeipa_enroll_effective_domain_normalized: >-
      {{
        linux_freeipa_enroll_effective_domain
        | default('', true)
        | string
        | trim
        | lower
      }}
    linux_freeipa_enroll_effective_servers_normalized: >-
      {{
        (
          linux_freeipa_enroll_effective_servers
          if (linux_freeipa_enroll_effective_servers is sequence and linux_freeipa_enroll_effective_servers is not string)
          else (
            linux_freeipa_enroll_effective_servers
            | default('', true)
            | string
            | split(',')
          )
        )
        | map('string')
        | map('trim')
        | reject('equalto', '')
        | map('lower')
        | list
      }}
  changed_when: false
  no_log: true

- name: Assert Linux IPA domain is not configured as an IPA server hostname
  ansible.builtin.assert:
    that:
      - linux_freeipa_enroll_effective_domain_normalized not in linux_freeipa_enroll_effective_servers_normalized
    fail_msg: >-
      ipaclient_domain must be the shared IPA DNS domain, not an IPA server hostname.
      For example, use example.com for ipaclient_domain and ipa01.example.com under linux_ipa_servers.
      Current values are ipaclient_domain={{ linux_freeipa_enroll_effective_domain_normalized }} and
      linux_ipa_servers={{ linux_freeipa_enroll_effective_servers_normalized | join(', ') }}.
  when: linux_freeipa_enroll_effective_servers_normalized | length > 0

- name: Resolve configured IPA servers from the Linux guest
  ansible.builtin.command:
    argv:
      - getent
      - hosts
      - "{{ item }}"
  register: linux_freeipa_enroll_server_resolution
  loop: "{{ linux_freeipa_enroll_effective_servers_normalized }}"
  changed_when: false
  failed_when: false
  check_mode: false
  when:
    - linux_freeipa_enroll_effective_servers_normalized | length > 0
    - not (linux_freeipa_enroll_effective_configure_dns_resolver | bool)

- name: Assert configured IPA servers resolve from the Linux guest
  ansible.builtin.assert:
    that:
      - item.rc == 0
      - item.stdout | default('') | trim | length > 0
    fail_msg: >-
      Linux guest {{ inventory_hostname }} cannot resolve the configured IPA server {{ item.item }}.
      Verify DNS or /etc/hosts on the guest, and verify ipaclient_domain is the shared IPA DNS domain
      rather than a server hostname.
  loop: "{{ linux_freeipa_enroll_server_resolution.results | default([]) }}"
  loop_control:
    label: "{{ item.item }}"
  when: not (linux_freeipa_enroll_effective_configure_dns_resolver | bool)

- name: Check LDAP reachability to configured IPA servers from the Linux guest
  ansible.builtin.wait_for:
    host: "{{ item }}"
    port: 389
    timeout: 5
    connect_timeout: 3
    state: started
  register: linux_freeipa_enroll_ldap_connectivity
  changed_when: false
  failed_when: false
  check_mode: false
  loop: "{{ linux_freeipa_enroll_effective_servers_normalized }}"
  loop_control:
    label: "{{ item }}"

- name: Assert LDAP reachability to configured IPA servers from the Linux guest
  ansible.builtin.assert:
    that:
      - not (item.failed | default(false))
      - item.elapsed is defined
    fail_msg: >-
      Linux guest {{ inventory_hostname }} cannot reach LDAP on {{ item.item }}:389.
      FreeIPA client discovery needs TCP 389 to the IPA server. Verify firewall, routing, and that
      the configured target is a real IPA server.
  loop: "{{ linux_freeipa_enroll_ldap_connectivity.results | default([]) }}"
  loop_control:
    label: "{{ item.item }}"

- name: Check HTTPS reachability to configured IPA servers from the Linux guest
  ansible.builtin.wait_for:
    host: "{{ item }}"
    port: 443
    timeout: 5
    connect_timeout: 3
    state: started
  register: linux_freeipa_enroll_https_connectivity
  changed_when: false
  failed_when: false
  check_mode: false
  loop: "{{ linux_freeipa_enroll_effective_servers_normalized }}"
  loop_control:
    label: "{{ item }}"

- name: Assert HTTPS reachability to configured IPA servers from the Linux guest
  ansible.builtin.assert:
    that:
      - not (item.failed | default(false))
      - item.elapsed is defined
    fail_msg: >-
      Linux guest {{ inventory_hostname }} cannot reach HTTPS on {{ item.item }}:443.
      FreeIPA enrollment also needs the IPA web/API endpoint. Verify firewall, routing, and that
      the configured target is a real IPA server.
  loop: "{{ linux_freeipa_enroll_https_connectivity.results | default([]) }}"
  loop_control:
    label: "{{ item.item }}"

- name: Read current Linux guest FQDN before IPA enrollment
  ansible.builtin.command: hostname -f
  register: linux_freeipa_enroll_current_fqdn
  check_mode: false
  changed_when: false
  failed_when: false

- name: Read current Linux guest short hostname before IPA enrollment
  ansible.builtin.command: hostname -s
  register: linux_freeipa_enroll_current_short_hostname
  check_mode: false
  changed_when: false
  failed_when: false

- name: Prepare Linux guest hostname candidates for IPA enrollment
  ansible.builtin.set_fact:
    linux_freeipa_enroll_target_hostname: >-
      {{
        freeipa_hostgroup_hostname
        | default(linux_ipa_effective_hostname, true)
        | default('', true)
        | string
        | trim
        | lower
      }}
    linux_freeipa_enroll_current_fqdn_normalized: >-
      {{
        linux_freeipa_enroll_current_fqdn.stdout
        | default('', true)
        | string
        | trim
        | lower
      }}
  changed_when: false

- name: Update Linux guest system hostname from the resolved IPA hostname
  ansible.builtin.command:
    argv:
      - hostnamectl
      - set-hostname
      - "{{ linux_freeipa_enroll_target_hostname }}"
  when:
    - linux_freeipa_enroll_manage_hostname | bool
    - not ansible_check_mode
    - linux_freeipa_enroll_target_hostname is match('^[a-z0-9][a-z0-9.-]*\\.[a-z0-9-]+$')
    - not (linux_freeipa_enroll_target_hostname is match('^[0-9.]+$'))
    - linux_freeipa_enroll_current_fqdn_normalized in ['localhost', 'localhost.localdomain', linux_freeipa_enroll_current_short_hostname.stdout | default('', true) | string | trim | lower]
  changed_when: true

- name: Re-read Linux guest FQDN after hostname management
  ansible.builtin.command: hostname -f
  register: linux_freeipa_enroll_current_fqdn
  check_mode: false
  changed_when: false
  failed_when: false
  when:
    - linux_freeipa_enroll_manage_hostname | bool
    - not ansible_check_mode

- name: Assert the Linux guest has a valid system hostname for IPA enrollment
  ansible.builtin.assert:
    that:
      - >-
        (
          linux_freeipa_enroll_current_fqdn.stdout | default('') | trim | lower not in ['localhost', 'localhost.localdomain']
          and
          (linux_freeipa_enroll_current_fqdn.stdout | default('') | trim | lower is match('^[a-z0-9][a-z0-9.-]*\\.[a-z0-9-]+$'))
          and
          not ((linux_freeipa_enroll_current_fqdn.stdout | default('') | trim | lower) is match('^[0-9.]+$'))
        )
        or
        (
          ansible_check_mode
          and
          linux_freeipa_enroll_manage_hostname | bool
          and linux_freeipa_enroll_target_hostname is match('^[a-z0-9][a-z0-9.-]*\\.[a-z0-9-]+$')
          and not (linux_freeipa_enroll_target_hostname is match('^[0-9.]+$'))
        )
    fail_msg: >-
      Linux guest {{ inventory_hostname }} cannot be enrolled into FreeIPA because its current system hostname is
      {{ linux_freeipa_enroll_current_fqdn.stdout | default('unset') | trim | default('unset', true) }}.
      {% if linux_freeipa_enroll_target_hostname | length > 0 %}
      The resolved target hostname for this guest is {{ linux_freeipa_enroll_target_hostname }}.
      {% endif %}
      Set a real FQDN on the guest first, or enable linux_freeipa_enroll_manage_hostname and provide a resolvable
      FQDN through ipa_hostname, linux_ipa_identity_hostname_suffix, or the guest's own hostname configuration.

- name: Resolve the Linux guest hostname that will be enrolled
  ansible.builtin.set_fact:
    linux_freeipa_enroll_hostname_to_verify: >-
      {{
        (
          linux_freeipa_enroll_target_hostname
          if (linux_freeipa_enroll_target_hostname | length > 0)
          else (
            linux_freeipa_enroll_current_fqdn.stdout
            | default('', true)
            | string
            | trim
            | lower
          )
        )
      }}
  changed_when: false

- name: Resolve the Linux guest enrollment hostname locally on the guest
  ansible.builtin.command:
    argv:
      - getent
      - hosts
      - "{{ linux_freeipa_enroll_hostname_to_verify }}"
  register: linux_freeipa_enroll_hostname_resolution
  changed_when: false
  failed_when: false
  check_mode: false

- name: Assert the Linux guest enrollment hostname resolves to a non-loopback address
  ansible.builtin.assert:
    that:
      - linux_freeipa_enroll_hostname_resolution.rc == 0
      - linux_freeipa_enroll_hostname_resolution.stdout | default('') | trim | length > 0
      - (linux_freeipa_enroll_hostname_resolution.stdout | trim | split() | first) not in ['127.0.0.1', '::1']
      - not ((linux_freeipa_enroll_hostname_resolution.stdout | trim | split() | first) is match('^127\\.'))
    fail_msg: >-
      Linux guest {{ inventory_hostname }} resolves its enrollment hostname {{ linux_freeipa_enroll_hostname_to_verify }}
      to {{ linux_freeipa_enroll_hostname_resolution.stdout | default('an unresolved value') | trim | default('an unresolved value', true) }}.
      The guest hostname must resolve to the guest's real non-loopback address, not 127.0.0.1 or ::1.
      Fix DNS or /etc/hosts on the guest before IPA enrollment.

- name: Skip Linux IPA enrollment in check mode
  ansible.builtin.debug:
    msg: >-
      Check mode skips the upstream FreeIPA ipaclient enrollment role in this repository.
      Use validate.yml plus a real linux-clients or site run to verify actual Linux IPA enrollment.
  when: ansible_check_mode
  changed_when: false

- name: Join Linux host to FreeIPA
  ansible.builtin.include_role:
    name: freeipa.ansible_freeipa.ipaclient
  vars:
    state: present
    ipaadmin_principal: "{{ linux_freeipa_enroll_effective_ipaadmin_principal }}"
    ipaadmin_password: "{{ linux_freeipa_enroll_effective_ipaadmin_password }}"
    ipaclient_hostname: "{{ linux_freeipa_enroll_target_hostname if (linux_freeipa_enroll_target_hostname | length > 0) else omit }}"
    ipaclient_domain: "{{ linux_freeipa_enroll_effective_domain }}"
    ipaclient_realm: "{{ linux_freeipa_enroll_effective_realm }}"
    ipaclient_servers: "{{ linux_freeipa_enroll_effective_servers_normalized if (linux_freeipa_enroll_effective_servers_normalized | length > 0) else omit }}"
    ipaclient_mkhomedir: "{{ linux_freeipa_enroll_effective_mkhomedir }}"
    ipaclient_force_join: "{{ linux_freeipa_enroll_effective_force_join }}"
    ipaclient_no_dns_lookup: "{{ linux_freeipa_enroll_effective_no_dns_lookup }}"
    ipaclient_no_sudo: "{{ linux_freeipa_enroll_effective_no_sudo }}"
    ipasssd_permit: "{{ linux_freeipa_enroll_effective_permit }}"
    ipaclient_install_packages: "{{ linux_freeipa_enroll_effective_install_packages }}"
    ipaclient_configure_dns_resolver: "{{ linux_freeipa_enroll_effective_configure_dns_resolver }}"
    ipaclient_dns_servers: "{{ linux_freeipa_enroll_effective_dns_servers if (linux_freeipa_enroll_effective_dns_servers | length > 0) else omit }}"
  when: not ansible_check_mode
  no_log: true
